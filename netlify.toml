[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/generate-inti"
  to = "/.netlify/functions/generate-inti"
  status = 200

[[redirects]]
  from = "/api/generate-pertemuan"
  to = "/.netlify/functions/generate-pertemuan"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
